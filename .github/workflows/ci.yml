name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig 0.16
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Build
        run: zig build

      - name: Test
        run: zig build test
