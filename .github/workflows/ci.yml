name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig 0.16
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Test
        run: zig build test
